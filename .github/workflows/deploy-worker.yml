name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - "goldshore-gateway/**"
      - "goldshore-gateway/AGENT_SCOPE.yaml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: goldshore-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: goldshore-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy gateway worker
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
