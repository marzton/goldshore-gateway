name: Cloudflare Pages CI

on:
  pull_request:
    paths:
      - "app/**"
      - "public/**"
      - "workers/**"
      - "packages/env/**"
      - "package.json"
      - "package-lock.json"
      - "react-router.config.ts"
      - "vite.config.ts"
      - "tailwind.config.ts"
      - "tsconfig.json"
      - "tsconfig.cloudflare.json"
      - "tsconfig.node.json"
      - "wrangler.jsonc"
      - ".github/workflows/pages-ci.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "public/**"
      - "workers/**"
      - "packages/env/**"
      - "package.json"
      - "package-lock.json"
      - "react-router.config.ts"
      - "vite.config.ts"
      - "tailwind.config.ts"
      - "tsconfig.json"
      - "tsconfig.cloudflare.json"
      - "tsconfig.node.json"
      - "wrangler.jsonc"
      - ".github/workflows/pages-ci.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build root app
        run: npm run build

      - name: Validate build output
        run: |
          if [ ! -d "build/client" ] || [ ! -d "build/server" ]; then
            echo "::error::Expected React Router build output in build/client and build/server."
            exit 1
          fi
          echo "Build output validated."

  notify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Notify success
        run: echo "Cloudflare Pages build succeeded."
