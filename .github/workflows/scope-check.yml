name: Scope Check

on:
  pull_request:

jobs:
  scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Validate changed paths against the applicable scope file
        run: |
          git fetch origin main --depth=1
          mapfile -t CHANGED < <(git diff --name-only origin/main...HEAD)

          ROOT_PATHS=()
          GATEWAY_PATHS=()

          for path in "${CHANGED[@]}"; do
            [ -z "$path" ] && continue
            if [[ "$path" == goldshore-gateway/* ]]; then
              GATEWAY_PATHS+=("$path")
            else
              ROOT_PATHS+=("$path")
            fi
          done

          if [ ${#ROOT_PATHS[@]} -gt 0 ]; then
            python3 .github/scripts/validate_agent_scope.py AGENT_SCOPE.yaml "${ROOT_PATHS[@]}"
          fi

          if [ ${#GATEWAY_PATHS[@]} -gt 0 ]; then
            python3 .github/scripts/validate_agent_scope.py goldshore-gateway/AGENT_SCOPE.yaml "${GATEWAY_PATHS[@]}"
          fi

          echo "Scope check passed."
