name: Manual Preview Deployment

on:
  workflow_dispatch:
    inputs:
      worker:
        description: 'The worker to deploy (e.g., goldshore-api, goldshore-gateway)'
        required: true
        type: choice
        options:
        - goldshore-api
        - goldshore-gateway
      branch:
        description: 'The branch to deploy to the preview environment'
        required: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies and build
        run: |
          cd ${{ github.event.inputs.worker }}
          npm install
          npm run build # Assuming a build step is necessary

      - name: Deploy to Cloudflare Preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env preview
          workingDirectory: ${{ github.event.inputs.worker }}
