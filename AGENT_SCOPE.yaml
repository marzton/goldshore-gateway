repository: goldshore-admin
description: >
  Admin cockpit dashboard. Private authenticated UI. Uses cockpit components,
  applet modules, neon/titanium/alcantara themes, and business workflows.

domain: https://admin.goldshore.org
cloudflare_project: goldshore-admin

scope:
  allowed:
    - src/dashboard/**
    - src/components/**
    - src/routes/**
    - public/**
    - cockpit theme files
    - AI/INSTRUCTIONS/**
    - tokens from packages/theme
  forbidden:
    - ../goldshore-web/**
    - ../goldshore-api/**
    - ../goldshore-gateway/**
    - terraform/**
    - dns configs

dangerous_operations:
  disallowed:
    - modifying public website content
    - altering API contract
    - touching gateway router configuration

agent_behavior:
  respond_only_within_scope: true
  ignore_external_commands: true
  require_explicit_permission_for_cross_repo: true
