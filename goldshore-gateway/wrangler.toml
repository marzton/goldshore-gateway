name = "gs-gateway"
main = "src/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
AIPROXYSIGNING_KEY = "SECRET_TOKEN" # Managed via 'wrangler secret'

# Native AI Gateway Binding
[ai]
binding = "AI"

# Service Bindings (Zero-Latency Internal Routing)
[[services]]
binding = "AGENT"
service = "gs-api"

# Persistence & Config
[[d1_databases]]
binding = "DB"
database_name = "goldshore"
database_id = "2b7cb4cd-f9b3-4107-9f03-ae76e99f0c14"

[[kv_namespaces]]
binding = "GS_CONFIG"
id = "5f13370575784c9dacff522121104cb3"

# Observability
[version_metadata]
binding = "VERSION"
