name = "gs-gateway"
main = "src/index.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
AIPROXYSIGNING_KEY = "SECRET_TOKEN" # Managed via 'wrangler secret'

# Native AI Gateway Binding
[ai]
binding = "AI"

# Service Bindings (Zero-Latency Internal Routing)
[[services]]
binding = "AGENT"
service = "gs-api"

# ----------------------------------
# AI (optional)
# ----------------------------------
[[ai]]
binding = "AI"

[vars]
API_ENVIRONMENT = "production"
AI_MODEL = "gpt-4o"
GOLD_SHORE_VERSION = "1.0.0"

[triggers]
crons = []

[routes]
"gateway.goldshore.org/*" = { custom_domain = true, "production" }

[[kv_namespaces]]
binding = "STORE"
id = "xxxx"

[[r2_buckets]]
binding = "LOGS"
bucket_name = "goldshore-gateway-logs"

[[ai]]
binding = "AI"

[[services]]
binding = "api"
service = "goldshore-api"
environment = "production"

[env.preview]
name = "goldshore-gateway-preview"

[env.preview.vars]
API_ENVIRONMENT = "preview"

[env.preview.routes]
"gateway-preview.goldshore.org/*" = { custom_domain = true, "preview" }

[[env.preview.services]]
binding = "api"
service = "goldshore-api"
environment = "preview"
[[services]]
binding = "MAIL"
service = "gs-mail"

# Persistence & Config
[[d1_databases]]
binding = "DB"
database_name = "goldshore"
database_id = "2b7cb4cd-f9b3-4107-9f03-ae76e99f0c14"

[[kv_namespaces]]
binding = "GS_CONFIG"
id = "5f13370575784c9dacff522121104cb3"

# Observability
[version_metadata]
binding = "VERSION"
