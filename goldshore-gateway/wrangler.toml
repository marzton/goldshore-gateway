name = "goldshore-gateway"
main = "src/index.ts"
compatibility_date = "2025-11-18"
account_id = "f77de112d2019e5456a3198a8bb50bd2"

routes = [
	{ pattern = "gateway.goldshore.org/*", zone_id = "d86cd71f0d1c8b8e08928a32e0c95ae3" }
]

[vars]
GATEWAY_SERVICE_NAME = "goldshore-gateway"
DEFAULT_MODEL = "gpt-4o-mini"
GOLDSHORE_ENV = "production"
GOLDSHORE_ORIGIN = "https://goldshore.org"
ACCESS_AUDIENCE = "3ae67260bc738a42d4eeaf1525fd4941bf220375e5325c2cb76dbe653a2f8c25"
CLOUDFLARE_JWKS_URI = "https://goldshore.cloudflareaccess.com/cdn-cgi/access/certs"

[env.production]
routes = [
	{ pattern = "gateway.goldshore.org/*", zone_id = "d86cd71f0d1c8b8e08928a32e0c95ae3" }
]

# KV namespaces
[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "kv_sessions_namespace_id_01GSX6J8P9Z7Y5Q3A1AB"
preview_id = "kv_sessions_preview_id_01GSX6J8P9Z7Y5Q3A1AB"

[[kv_namespaces]]
binding = "KV_CACHE"
id = "kv_cache_namespace_id_01GSX6J8P9Z7Y5Q3A1AC"
preview_id = "kv_cache_preview_id_01GSX6J8P9Z7Y5Q3A1AC"

# R2 buckets
[[r2_buckets]]
binding = "R2_PUBLIC"
bucket_name = "goldshore-public"

[[r2_buckets]]
binding = "R2_LOGS"
bucket_name = "goldshore-logs"

# Queues
[[queues.producers]]
binding = "QUEUE_EVENTS"
queue = "goldshore-events"

[[queues.producers]]
binding = "QUEUE_DLQ"
queue = "goldshore-dlq"

# D1
[[d1_databases]]
binding = "D1_DATABASE"
database_name = "goldshore-core"
database_id = "d1_goldshore_core_id_01GSX6J8P9Z7Y5Q3A1AD"

[observability]
enabled = true