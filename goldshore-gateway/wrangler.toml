name = "goldshore-gateway"
main = "src/index.ts"
compatibility_date = "2025-01-15"

account_id = "YOUR_ACCOUNT_ID"

# ----------------------------------
# GATEWAY ROUTES (PROD)
# ----------------------------------
routes = [
  { pattern = "gateway.goldshore.org/*", zone_name = "goldshore.org" }
]

# ----------------------------------
# SERVICE BINDINGS
# goldshore-api is usually called from the gateway
# ----------------------------------
[[services]]
binding = "api"
service = "goldshore-api"
environment = "production"

# Optional: call admin or other workers later
# [[services]]
# binding = "admin"
# service = "goldshore-admin"

# ----------------------------------
# KV (routing tables, tokens, users)
# ----------------------------------
[[kv_namespaces]]
binding = "GATEWAY_STATE"
id = "GATEWAY_KV_ID"

# ----------------------------------
# AI (optional)
# ----------------------------------
[[ai]]
binding = "AI"

[vars]
APP_NAME = "goldshore-gateway"
APP_ENV = "production"

# ----------------------------------
# PREVIEW ENV
# ----------------------------------
[env.preview]
routes = [
  { pattern = "gateway-preview.goldshore.org/*", zone_name = "goldshore.org" }
]

[env.preview.vars]
APP_ENV = "preview"
