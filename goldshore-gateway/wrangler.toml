name = "goldshore-gateway"
main = "src/index.ts"
compatibility_date = "2023-11-21"

[vars]
API_ENVIRONMENT = "production"
AI_MODEL = "gpt-4o"
GOLD_SHORE_VERSION = "1.0.0"

[triggers]
crons = []

[routes]
"gateway.goldshore.org/*" = { custom_domain = true, "production" }

[[kv_namespaces]]
binding = "STORE"
id = "xxxx"

[[r2_buckets]]
binding = "LOGS"
bucket_name = "goldshore-gateway-logs"

[[ai]]
binding = "AI"

[[services]]
binding = "api"
service = "goldshore-api"
environment = "production"

[env.preview]
name = "goldshore-gateway-preview"

[env.preview.vars]
API_ENVIRONMENT = "preview"

[env.preview.routes]
"gateway-preview.goldshore.org/*" = { custom_domain = true, "preview" }

[[env.preview.services]]
binding = "api"
service = "goldshore-api"
environment = "preview"
