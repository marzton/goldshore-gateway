project: goldshore-gateway
description: >
  Cloudflare Worker AI gateway that routes chat completions to OpenAI, Anthropic,
  Google Gemini, Groq and internal tools. Uses HMAC signed payloads and Cloudflare Access.

repos:
  - name: goldshore-gateway
    host: github.com
    org: goldshore
    default_branch: main

deployment:
  tool: cloudflare-wrangler
  wrangler_config: wrangler.toml
  build_command: "npm run build"
  deploy_command: "npx wrangler deploy --env production"

runtime_env:
  - key: OPENAI_API_KEY
    required: true
    source: "OpenAI dashboard"
  - key: GOOGLE_GEMINI_KEY
    required: false
    source: "Google AI Studio"
  - key: GOOGLE_JULES_KEY
    required: false
    source: "Google Jules"
  - key: JWT_HS256_KEY
    required: true
    generator: "openssl rand -hex 32"
  - key: SESSION_SECRET
    required: true
    generator: "openssl rand -base64 48 | tr '+/' '-_' | tr -d '='"

tasks:
  - id: bump-compat-date
    description: "Update compatibility_date to today's date in wrangler.toml"
  - id: sync-bindings
    description: "Ensure KV, R2, D1 and Queues bindings match Cloudflare dashboard names"
  - id: validate-env
    description: "Check required env vars are present in production environment"

ai_routing:
  default_model: gpt-4o-mini
  providers:
    - openai
    - anthropic
    - google-gemini
    - groq
  policy: balanced_v1